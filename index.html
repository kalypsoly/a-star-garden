<!DOCTYPE html>
<html>
<head>
<title>The Quiet Star Garden</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Georgia,serif;
background:#f4f1e8;
color:#3f4a34;
overflow:hidden;
transition:background 2s;
}

/* NIGHT MODE */

body.night{
background:#0b1022;
color:#e6ecff;
}

/* MESSAGE BOX */

.box{
background:#fffdf7;
padding:40px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.2);
max-width:520px;
text-align:center;
z-index:2;
}

body.night .box{
background:#151c33;
}

/* BUTTON */

.wish{
margin-top:20px;
padding:10px 18px;
border:none;
border-radius:20px;
background:#f6e8a6;
font-family:Georgia,serif;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

.wish:hover{
transform:scale(1.05);
}

body.night .wish{
background:#3c4a85;
color:white;
}

/* STARS */

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
0%{opacity:0.2}
50%{opacity:1}
100%{opacity:0.2}
}

/* SHOOTING STARS */

.shooting-star{
position:absolute;
width:120px;
height:2px;
background:linear-gradient(90deg,white,transparent);
opacity:0.8;
transform:rotate(45deg);
animation:shoot 4s linear forwards;
}

@keyframes shoot{
0%{transform:translate(-200px,-200px) rotate(45deg);opacity:1;}
100%{transform:translate(800px,800px) rotate(45deg);opacity:0;}
}

/* FIREFLIES */

.firefly{
position:absolute;
width:6px;
height:6px;
background:#ffd86b;
border-radius:50%;
box-shadow:0 0 10px #ffd86b;
animation:float 10s infinite linear;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-120px)}
100%{transform:translateY(0)}
}

/* MUSHROOMS */

.mushroom{
position:absolute;
bottom:10px;
font-size:28px;
}

.m1{left:20px}
.m2{left:60px}
.m3{right:40px}

.small{
margin-top:20px;
font-size:14px;
opacity:0.7;
}

</style>
</head>

<body>

<div class="box" id="content" style="display:none;">
<h1>⭐ a small star note for today</h1>

<p id="message"></p>

<button onclick="makeWish()" class="wish">⭐ make a wish</button>

<div class="small">come back tomorrow 🌙</div>
</div>

<div class="mushroom m1">🍄</div>
<div class="mushroom m2">🍄</div>
<div class="mushroom m3">🍄</div>

<script>

/* PASSWORD */

let password = prompt("enter the garden password 🌿");

if(password !== "cosmicgarden"){
document.body.innerHTML = "this little garden isn't meant for you.";
}

/* DAY/NIGHT MODE */

const hour = new Date().getHours();

if(hour >= 18 || hour <= 5){
document.body.classList.add("night");
}

/* CREATE STARS */

for(let i=0;i<90;i++){
let star=document.createElement("div");
star.className="star";
star.style.top=Math.random()*100+"vh";
star.style.left=Math.random()*100+"vw";
star.style.animationDuration=(2+Math.random()*3)+"s";
document.body.appendChild(star);
}

/* CREATE FIREFLIES */

for(let i=0;i<12;i++){
let fly=document.createElement("div");
fly.className="firefly";
fly.style.left=Math.random()*100+"vw";
fly.style.top=Math.random()*100+"vh";
fly.style.animationDuration=(8+Math.random()*6)+"s";
document.body.appendChild(fly);
}

/* SHOOTING STAR */

function createShootingStar(){

let star=document.createElement("div");
star.className="shooting-star";

star.style.top=Math.random()*40+"vh";
star.style.left=Math.random()*40+"vw";

document.body.appendChild(star);

setTimeout(()=>{
star.remove();
},4000);

}

/* RANDOM SHOOTING STARS */

setInterval(()=>{
if(Math.random()<0.5){
createShootingStar();
}
},8000);

/* MAKE A WISH BUTTON */

function makeWish(){

createShootingStar();

let wish=document.createElement("div");

wish.innerText="⭐ may your wish travel safely through the stars";

wish.style.position="absolute";
wish.style.bottom="120px";
wish.style.left="50%";
wish.style.transform="translateX(-50%)";
wish.style.fontSize="18px";

document.body.appendChild(wish);

wish.remove();
},4000);

}

/* DAY OF YEAR */

const today=new Date();
const start=new Date(today.getFullYear(),0,0);

const oneDay=1000*60*60*24;
const day=Math.floor(diff/oneDay);

document.getElementById("content").style.display="block";

</script>
